<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Eventos Acadêmicos</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Eventos Acadêmicos</h1>

  <form id="formEvento">

    <input
      type="text"
      id="titulo"
      placeholder="Título"
      required
    >

    <input
      type="text"
      id="descricao"
      placeholder="Descrição"
    >

    <input
      type="date"
      id="data"
      required
    >

    <input
      type="text"
      id="local"
      placeholder="Local"
      required
    >

    <button type="submit" id="botaoSalvar">
      Salvar Evento
    </button>

  </form>

  <div id="loading">
    Carregando...
  </div>

  <div id="listaEventos"></div>

  <script src="script.js"></script>

</body>
</html>
